version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Bangkok
    labels:
      - dependencies
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-safe-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Asia/Bangkok
    labels:
      - dependencies
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-safe-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
