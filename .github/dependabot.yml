version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Bangkok
    assignees:
      - jb-thery
    labels:
      - dependencies
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Asia/Bangkok
    assignees:
      - jb-thery
    labels:
      - dependencies
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
